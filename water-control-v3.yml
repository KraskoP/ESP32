    name: "Trigger 5"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_5
    on_release:
      then:
        - switch.turn_off: relay_5    


  - platform: gpio
