substitutions:
  devicename: "watering-controler"

globals:
  - id: selected_square
    type: int
    restore_value: no
    initial_value: "0" # 0=Czerwony, 1=Zielony, 2=Niebieski, 3=Żółty
  - id: is_locked
    type: bool
    restore_value: no
    initial_value: "false"

esphome:
  name: ${devicename}
  on_boot:
    priority: -10
    then:
      - switch.turn_on: backlight_switch



