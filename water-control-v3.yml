# Podstawowa czcionka (wymagana do lambdy)
font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 20

# Magistrala SPI na bezpiecznych pinach
spi:
  clk_pin: GPIO 5
  mosi_pin: GPIO 6

image:
  - file: "backgroundpico.png"  # Nazwa Twojego pliku
    id: my_background
    resize: 480x320         # ESPHome sam dopasuje rozmiar, jeśli trzeba
    type: INDEXED           # Użyj COLOR dla kolorowych wyświetlaczy jak ST7796  
    dither: NONE
    use_raw_data: true

display:
  - platform: mipi_spi
    id: my_display
    model: ST7796
    dimensions:
      width: 480
      height: 320
    # Sugerowane bezpieczniejsze piny dla S3:
    cs_pin: GPIO 4
    dc_pin: GPIO 7
    reset_pin: GPIO 8
    rotation: 90
    data_rate: 40MHz
    update_interval: 500ms

    lambda: |-

      struct Point { int x; int y; };

      // === 1. DEFINICJE PUNKTÓW DLA WIELOKĄTÓW (ZARYSY SEKCJI) ===
      // Sekcja 1 (np. Trawnik Front)
      Point s1[] = {{35,270}, {175,270}, {175,250}, {135,250}, {115, 230}, {115, 165}, {35, 165}, {35,220}, {70,220}, {70,250}, {35, 250}, {35, 270}};
      // Sekcja 2 (np. Rabaty)
      Point s2[] = {{35,160}, {130,160}, {130,30}, {30,30}, {30,75}, {55,75}, {55,120}, {35,120}, {35,160}};

      // === 2. FUNKCJA RYSOWANIA GEOMETRYCZNYCH DRZEW ===
      // 'Tree' to złożony kształt z wielu okręgów. Przekazujemy środek trunkera.
      auto draw_circle_tree = [&](int trunkX, int trunkY, int baseR, Color trunkCol, Color leaveCol) 
      {
          // Trzon (Pień) - prostokąt
          it.filled_rectangle(trunkX - (baseR/4), trunkY, baseR/2, baseR*1.5, trunkCol);
          
          // Korona (Liście) - złożona z 6 okręgów
          it.filled_circle(trunkX, trunkY - baseR, baseR * 1.2, leaveCol);          // Centralny, duży
          it.filled_circle(trunkX - baseR, trunkY - baseR*0.8, baseR, leaveCol); // Lewy
          it.filled_circle(trunkX + baseR, trunkY - baseR*0.8, baseR, leaveCol); // Prawy
          it.filled_circle(trunkX - baseR*0.7, trunkY - baseR*1.6, baseR*0.8, leaveCol); // Lewy górny
          it.filled_circle(trunkX + baseR*0.7, trunkY - baseR*1.6, baseR*0.8, leaveCol); // Prawy górny
          it.filled_circle(trunkX, trunkY - baseR*2.1, baseR*0.7, leaveCol); // Centralny górny
      };

      // === 3. FUNKCJA RYSOWANIA INTERAKTYWNYCH SEKCJI (POLIGONY) ===
      auto draw_zone = [&](Point pts[], int count, bool is_active, bool is_selected, Color active_col) 
      {
          // Kolory: Jasnoniebieski (Focus), Zielony (Podlewanie), Ciemnoszary (Tło)
          Color col = is_selected ? Color(0, 150, 255) : (is_active ? active_col : Color(50, 50, 50));
          
          for (int i = 0; i < count; i++) 
          {
              int x1 = pts[i].x; int y1 = pts[i].y;
              int x2 = pts[(i + 1) % count].x; int y2 = pts[(i + 1) % count].y;
              
              // Rysuj cienki obrys
              it.line(x1, y1, x2, y2, col);
              // Rysuj pogrubiony obrys i kółka w rogach tylko dla wybranego/aktywnego
              if (is_active || is_selected) 
              {
                  it.line(x1+1, y1, x2+1, y2, col);
                  it.filled_circle(x1, y1, 1, col);
              }
          }
      };

      // === 4. RYSOWANIE GEOMETRYCZNEJ MAPY (WARSTWY) ===
      
      // Warstwa 1: Tło ogrodu (Ciemnozielony prostokąt)
      it.fill(Color(0, 40, 0));

      // Warstwa 2: Interaktywne Sekcje (Zmieniają kolor po wybraniu enkoderem)
      draw_zone(s1, 12, id(relay_1).state, (id(selected_square) == 0), Color(0, 255, 0)); // Trawnik - Zielony
      draw_zone(s2, 9, id(relay_2).state, (id(selected_square) == 1), Color(180, 255, 100)); // Rabaty - Jasnozielony

      // Warstwa 3: Dom i Budynki (Złożone prostokąty)
      // Dach (złożony z 3 prostokątów o różnych odcieniach brązu, bez trójkątów dla uproszczenia)
      it.filled_rectangle(200, 150, 200, 120, Color(100, 50, 20));  // Główny prostokąt
      it.filled_rectangle(220, 170, 160, 80, Color(120, 60, 24));   // Środkowy prostokąt
      it.filled_rectangle(250, 190, 100, 40, Color(140, 70, 28));   // Górny prostokąt
      
      // Kominek i daszek kominka (Prostokąty)
      it.filled_rectangle(200, 140, 30, 10, Color(130, 60, 25)); // Daszek kominka
      it.filled_rectangle(210, 130, 10, 10, Color(50, 25, 10));   // Kominek (ciemniejszy)
      
      // Budynek boczny (Daszek garażu?)
      it.filled_rectangle(150, 100, 50, 50, Color(100, 100, 100)); // Szary prostokąt

      // Warstwa 4: Drzewa (Złożone za pomocą funkcji draw_circle_tree)
      // Kolory drzew (indeksowane z palety tła)
      Color trunk = Color(80, 40, 10);
      Color leaves_dark = Color(0, 60, 0);
      Color leaves_med = Color(0, 100, 0);
      Color leaves_bright = Color(10, 180, 50);

      // Grupa lewa (małe krzewy - pojedyncze okręgi)
      it.filled_circle(20, 20, 15, leaves_med);
      it.filled_circle(15, 60, 12, leaves_dark);
      it.filled_circle(10, 100, 10, leaves_bright);
      
      // Górny rząd (grupa małych drzew)
      it.filled_circle(100, 10, 10, leaves_med);
      it.filled_circle(140, 10, 10, leaves_med);
      it.filled_circle(180, 10, 10, leaves_med);
      it.filled_circle(220, 10, 10, leaves_med);
      it.filled_circle(260, 10, 10, leaves_med);
      
      // Centralne duże drzewo na górze
      draw_circle_tree(320, 40, 25, trunk, Color(0, 200, 100)); // Jasnozielone, duże

      // Warstwa 5: Pasek dolny z czasem i interfejsem
      auto time_now = id(my_time).now();
      
      // Tło dla interfejsu (Ciemnoszary prostokąt)
      it.filled_rectangle(0, 275, 480, 45, Color(103, 103, 103)); 
      
      it.strftime(10, 310, id(my_font), Color(255, 255, 255), "%d.%m.%Y", time_now);
      it.strftime(280, 310, id(my_font), Color(0, 255, 0), "%H:%M:%S", time_now);
      
      // Dodatkowa etykieta "SEKCJA" wewnątrz interfejsu
      it.printf(150, 290, id(my_font), Color(255, 255, 255), "SEKCJA %01d", id(selected_square) + 1);


switch:
  - platform: gpio
    pin: GPIO 9
    id: backlight_switch
    name: "Podswietlenie"
    restore_mode: ALWAYS_ON

  - platform: gpio
    pin: GPIO15
    id: relay_1
    name: "Relay 1"
    inverted: false 
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO16
    id: relay_2
    name: "Relay 2"
    inverted: false
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO17
    id: relay_3
    name: "Relay 3"
    inverted: false
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO18
    id: relay_4
    name: "Relay 4"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO43 # Using higher pins for S3 safety
    id: relay_5
    name: "Relay 5"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO44
