time:
  - platform: sntp
    id: my_time
    timezone: "Europe/Warsaw" # Ustawia polską strefę czasową
    servers:
      - 0.pool.ntp.org


# Podstawowa czcionka (wymagana do lambdy)
font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 20

# Magistrala SPI na bezpiecznych pinach
spi:
  clk_pin: GPIO5
  mosi_pin: GPIO6

display:
  - platform: mipi_spi
    id: my_display
    model: ST7796
    dimensions:
      width: 480
      height: 320
    # Sugerowane bezpieczniejsze piny dla S3:
    cs_pin: GPIO4
    dc_pin: GPIO7
    reset_pin: GPIO8
    rotation: 90
    data_rate: 40MHz
    update_interval: 1s

    lambda: |-

      struct Point { int x; int y; };

      // === 1. DEFINICJE PUNKTÓW DLA WIELOKĄTÓW (ZARYSY SEKCJI) ===
      // Sekcja 1 (Trawnik Front Droga)
      static Point s1[] = {{35,270}, {175,270}, {175,250}, {135,250}, {115, 230}, {115, 165}, {35, 165}, {35,220}, {70,220}, {70,250}, {35, 250}, {35, 270}};
      // Sekcja 2 (Trawnik Front Tył)
      static Point s2[] = {{35,160}, {130,160}, {130,30}, {30,30}, {30,75}, {55,75}, {55,120}, {35,120}, {35,160}};
      // Sekcja 3 (Trawnik Taras)
      static Point s3[] = {{135,30}, {270,30}, {270,70}, {300, 85}, {300, 150}, {260,140}, {200, 140}, {200, 115}, {135,115}, {135,30}};
      // Sekcja 4 (Trawnik przed domkiem SPA)
      static Point s4[] = {{305,85}, {275,70}, {335,90}, {367,60}, {367,30}, {417,30}, {417,150}, {305, 150}, {305,85}};
      // Sekcja 5 (Trawnik za domem)
      static Point s5[] = {{417, 155}, {435, 172}, {455,180}, {475, 180}, {475, 245}, {440,245}, {440,200}, {417,200}, {417,185}, {400, 185}, {400, 155}, {417,155} };
      // Sekcja 6 (Linia kroplująca)
      static Point s6[] = {{5, 270}, {5,5}, {475, 5}, {475,10}, {10, 10}, {10,270}, {5,270} };



      // --- COLOR DEFINITIONS ---
      // These approximate the original image using standard 16-bit colors.
      static Color color_background = Color(0, 40, 0);       // Very dark green
      static Color color_pavement = Color(40, 40, 40);       // Dark charcoal/black
      static Color color_roof = Color(103, 51, 1);           // Saddle Brown
      static Color color_roof_shadow = Color(46, 29, 8);     // Dark Brown
      static Color color_shed = Color(128, 128, 128);        // Grey
      static Color color_grey = Color(103, 103, 103);        // Light Grey
      static Color color_dark = Color(5, 5, 5);              // Dark
      
      // Tree variations (light to dark)
      static Color color_tree_bright = Color(127, 255, 0);   // Chartreuse
      static Color color_tree_mid = Color(60, 179, 113);     // Medium Sea Green
      static Color color_tree_normal = Color(0, 128, 0);     // Green
      static Color color_tree_dark = Color(0, 100, 0);       // Dark Green

      // --- HELPER FUNCTIONS ---
      // Draws a 'clumpy' tree composed of three overlapping circles.
      // x, y: center of the main cluster. r: base radius.
      static auto draw_clumpy_tree = [&](int x, int y, int r, Color color_fill, Color color_border, bool filled) 
      {
        if (filled) 
        {
          // Inner core circles for full fill
          it.filled_circle(x, y, r, color_fill);
          it.filled_circle(x - r/1.8, y + r/3, r/1.5, color_fill);
          it.filled_circle(x + r/1.8, y + r/3, r/1.5, color_fill);
        }
        // Border lines (draw last to overlap previous trees correctly)
        it.circle(x, y, r, color_border);
        it.circle(x - r/1.8, y + r/3, r/1.5, color_border);
        it.circle(x + r/1.8, y + r/3, r/1.5, color_border);
      };

      // Draw a background as a static FUNCTIONS
      static auto draw_background = [&]()
      {
      // === 4. RYSOWANIE GEOMETRYCZNEJ MAPY (WARSTWY) ===
      
      // Warstwa 1: Tło ogrodu (Ciemnozielony prostokąt)
      it.fill(color_background);

      // Taras
      it.filled_rectangle(144, 120, 56, 42, color_grey);
      it.rectangle(144, 120, 56, 42, color_pavement); // Border
        
      // --- 3. HOUSE ROOF ---
      // Main Body ( Left Rectangle)
        it.filled_rectangle(180, 150, 40, 120, color_roof);
      // Main Body ( Left Rectangle)
        it.filled_rectangle(220, 150, 40, 120, color_roof_shadow);
      // Left Roof
        it.filled_rectangle(140,163,50,44, color_roof);
        it.rectangle(140,163,50,44, color_dark);
        it.filled_rectangle(140,207,50,44, color_roof_shadow);
        it.rectangle(140,207,50,44, color_dark);
        it.filled_triangle(140, 163, 140, 250, 190, 206, color_roof);
        it.triangle(140, 163, 140, 250, 190, 206, color_dark);

      // Right Roof
        it.filled_rectangle(250,163,50,44, color_roof);
        it.rectangle(250,163,50,44, color_dark);
        it.filled_rectangle(250,207,50,44, color_roof_shadow);
        it.rectangle(250,207,50,44, color_dark);
        it.filled_triangle(300, 163, 250, 207, 300, 250, color_roof);
        it.triangle(300, 163, 250, 207, 300, 250, color_dark);
     
      // Garage
        it.filled_rectangle(300,190,110,30, color_roof);
        it.rectangle(300,190,110,30, color_dark);
        it.filled_rectangle(300,220,110,30, color_roof_shadow);
        it.rectangle(300,220,110,30, color_dark);
        it.filled_triangle(300, 190, 300, 250, 322, 220, color_roof);
        it.triangle(300, 190, 300, 250, 322, 220, color_dark);
        it.filled_triangle(410, 190, 410, 250, 388, 220, color_roof);
        it.triangle(410, 190, 410, 250, 388, 220, color_dark);

      // --- 4. TREES ---
      // These are drawn after the house to sit in front (layering).
      // We use simple border colors (BLACK) and solid fills.

      // Bottom-Left Clusters (Foreground)

        draw_clumpy_tree(25, 250, 25, color_tree_normal, color_tree_dark, true);
        draw_clumpy_tree(20, 210, 18, color_tree_normal, color_tree_dark, true);
        draw_clumpy_tree(55, 230, 12, color_tree_mid,    color_tree_dark, true);
        
        // Near House
        draw_clumpy_tree(130, 200, 12, color_tree_dark,    color_tree_dark, true);
        draw_clumpy_tree(130, 220, 12, color_tree_dark,    color_tree_dark, true);

        // Far Left Column
        draw_clumpy_tree(22, 160, 22, color_tree_dark,   color_tree_dark, true);
        draw_clumpy_tree(25, 120, 25, color_tree_bright, color_tree_dark, true);
        draw_clumpy_tree(30, 90, 30, color_tree_mid,    color_tree_dark, true);
        draw_clumpy_tree(12, 60, 18, color_tree_normal,    color_tree_dark, true);
        draw_clumpy_tree(25, 30, 16, color_tree_mid,    color_tree_dark, true);
        draw_clumpy_tree(22, 15, 20, color_tree_dark,   color_tree_dark, true);

        // Top Row (Left to Right)
        draw_clumpy_tree(60, 15, 18, color_tree_dark,   color_dark, true);
        draw_clumpy_tree(110, 18, 18, color_tree_dark,   color_dark, true);
        draw_clumpy_tree(150, 15, 15, color_tree_dark,   color_dark, true);
        draw_clumpy_tree(190, 15, 15, color_tree_dark,   color_dark, true);
        draw_clumpy_tree(230, 15, 15, color_tree_dark,   color_dark, true);
        draw_clumpy_tree(270, 15, 15, color_tree_dark,   color_dark, true);


        // Large Accent Trees
        draw_clumpy_tree(320, 40, 40, color_tree_dark,    color_dark, true); // Upper Right Big

        //Next to Office
        draw_clumpy_tree(269, 156, 15, color_tree_normal,    color_dark, true);        

        // Far Right Column
        draw_clumpy_tree(380, 15, 15, color_tree_dark,      color_tree_dark, true);
        draw_clumpy_tree(420, 15, 15, color_tree_dark,      color_tree_dark, true);
        draw_clumpy_tree(455, 60, 30, color_tree_normal,    color_tree_normal, true); // Mid-Right Big
        draw_clumpy_tree(450, 105, 25, color_tree_dark,     color_dark, true);
        draw_clumpy_tree(450, 150, 25, color_tree_normal,   color_tree_mid, true);            
      
        // Sauna & Jacuzzi
        it.filled_rectangle(340, 152, 57, 37, color_dark);
        it.filled_circle(320, 170, 14, color_grey);

        // Shed
        it.filled_rectangle(411, 200, 25, 40, color_dark);
        
        // Tło dla interfejsu (Ciemnoszary prostokąt)
        it.filled_rectangle(0, 275, 480, 45, color_grey);

        // Path to Garage
        it.filled_rectangle(350, 251, 130, 25, color_grey);
      
      };

      // === 3. FUNKCJA RYSOWANIA INTERAKTYWNYCH SEKCJI (POLIGONY) ===
      static auto draw_zone = [&](Point pts[], int count, bool is_active, bool is_selected, Color active_col) 
      {
          // Kolory: Jasnoniebieski (Focus), Zielony (Podlewanie), Ciemnoszary (Tło)
          Color col = is_selected ? Color(0, 150, 255) : (is_active ? active_col : Color(50, 50, 50));
          
          for (int i = 0; i < count; i++) 
          {
              int x1 = pts[i].x; int y1 = pts[i].y;
              int x2 = pts[(i + 1) % count].x; int y2 = pts[(i + 1) % count].y;
              
              // Rysuj cienki obrys
              it.line(x1, y1, x2, y2, col);
              // Rysuj pogrubiony obrys i kółka w rogach tylko dla wybranego/aktywnego
              if (is_active || is_selected) 
              {
                  it.line(x1+1, y1, x2+1, y2, col);
                  it.filled_circle(x1, y1, 1, col);
              }
          }
      };


      draw_background();

      // Warstwa 2: Interaktywne Sekcje (Zmieniają kolor po wybraniu enkoderem)
      draw_zone(s1, 12, id(relay_1).state, (id(selected_square) == 0), Color(0, 255, 0)); // Trawnik - Zielony
      draw_zone(s2, 9, id(relay_2).state, (id(selected_square) == 1), Color(180, 255, 100)); // Rabaty - Jasnozielony
      draw_zone(S3, 10, id(relay_3).state, (id(selected_square) == 1), Color(180, 255, 100));
      draw_zone(S4, 9, id(relay_4).state, (id(selected_square) == 1), Color(180, 255, 100));
      draw_zone(S5, 12, id(relay_5).state, (id(selected_square) == 1), Color(180, 255, 100));
      draw_zone(S6, 7, id(relay_6).state, (id(selected_square) == 1), Color(180, 255, 100));


      auto time_now = id(my_time).now();
      
      it.strftime(10, 290, id(my_font), Color(255, 255, 255), "%d.%m.%Y", time_now);
      it.strftime(280, 290, id(my_font), Color(0, 255, 0), "%H:%M:%S", time_now);
      
      // Dodatkowa etykieta "SEKCJA" wewnątrz interfejsu
      it.printf(150, 290, id(my_font), Color(255, 255, 255), "SEKCJA %01d", id(selected_square) + 1);


switch:
  - platform: gpio
    pin: GPIO9
    id: backlight_switch
    name: "Podswietlenie"
    restore_mode: ALWAYS_ON

  - platform: gpio
    pin: GPIO15
    id: relay_1
    name: "Relay 1"
    inverted: false 
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO16
    id: relay_2
    name: "Relay 2"
    inverted: false
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO17
    id: relay_3
    name: "Relay 3"
    inverted: false
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO18
    id: relay_4
    name: "Relay 4"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO43 # Using higher pins for S3 safety
    id: relay_5
    name: "Relay 5"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO44
    id: relay_6
    name: "Relay 6"
    inverted: false
    restore_mode: ALWAYS_OFF


# 2. Define the Trigger Inputs (Binary Sensors)
# These will trigger the relays when they receive a HIGH signal.
binary_sensor:

  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    name: "Encoder Button"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - lambda: |- 
               id(is_locked) = !id(is_locked);
               ESP_LOGD("custom", "Stan blokady: %s", id(is_locked) ? "ZABLOKOWANO" : "WOLNY");        
               id(my_display).update(); // Dodaj to tutaj!

  - platform: gpio
    pin: 
      number: GPIO10
      mode: INPUT_PULLDOWN # Keeps pin at 0V until a 5V/3.3V signal arrives
    name: "Trigger 1"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - switch.turn_on: relay_1
    on_release:
      then:
        - switch.turn_off: relay_1

  - platform: gpio
    pin: 
      number: GPIO11 
      mode: INPUT_PULLDOWN
    name: "Trigger 2"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_2
    on_release:
      then:
        - switch.turn_off: relay_2    

  - platform: gpio
    pin: 
      number: GPIO12 
      mode: INPUT_PULLDOWN
    name: "Trigger 3"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_3
    on_release:
      then:
        - switch.turn_off: relay_3    

  - platform: gpio
    pin: 
      number: GPIO13 
      mode: INPUT_PULLDOWN
    name: "Trigger 4"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_4
    on_release:
      then:
        - switch.turn_off: relay_4    


  - platform: gpio
    pin: 
      number: GPIO14
      mode: INPUT_PULLDOWN
    name: "Trigger 5"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_5
    on_release:
      then:
        - switch.turn_off: relay_5    


  - platform: gpio
    pin: 
      number: GPIO21
      mode: INPUT_PULLDOWN
    name: "Trigger 6"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_6
    on_release:
      then:
        - switch.turn_off: relay_6