substitutions:
  devicename: "watering-controler"

globals:
  - id: selected_square
    type: int
    restore_value: no
    initial_value: "0" # 0=Czerwony, 1=Zielony, 2=Niebieski, 3=Żółty
  - id: is_locked
    type: bool
    restore_value: no
    initial_value: "false"

esphome:
  name: ${devicename}
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    build_flags: 
      - "-DBOARD_HAS_PSRAM"  
  on_boot:
    priority: -10
    then:
      - switch.turn_on: backlight_switch

esp32:
  board: esp32-s3-devkitc-1
  framework:
#    type: esp-idf
    type: arduino
    version: latest


psram:
  mode: octal

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "jRk+WH7ka6UoenNffrOExh0USPW5De1pP9OPOPD1K4I="

ota:
  - platform: esphome
    password: "c6c2114b18b59dd26417358b1a8c51ab"

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Watering Fallback Hotspot"
    password: "ztKHYUuuA5iB"

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
      id: esp_ip
      icon: "mdi:information-box"
    ssid:
      name: WIFI SSID
      id: esp_ssid
      icon: "mdi:information-box"
    mac_address:
      name: MAC Address
      id: esp_mac
      icon: "mdi:information-box"
      
#I2C bus define
i2c:
  sda: GPIO41
  scl: GPIO42
  scan: True
  id: bus_a
  frequency: 50kHz

sensor:
  - platform: rotary_encoder
    id: my_encoder
    pin_a: GPIO19
    pin_b: GPIO20
    min_value: 0
    max_value: 5
    resolution: 1

    on_value:
      then:
        - lambda: |-
              if (!id(is_locked)) 
              {
                id(selected_square) = (int)x;
                // if (id(selected_square) < 0) id(selected_square) += 4;
                // WYMUŚ ODŚWIEŻENIE EKRANU NATYCHMIAST PO RUCHU:
                id(my_display).update(); 
              }

  # Wi-Fi Signal Strength (measured in dBm)
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: my_wifi_signal
    device_class: "signal_strength"
    unit_of_measurement: "dBm"    
    update_interval: 240s

# Uptime Sensor (How long the ESP has been running)
  - platform: uptime
    name: "Uptime"
    id: my_uptime
    update_interval: 60s
    
# Internal Chip Temperature (Optional but useful for S3)
  - platform: internal_temperature
    name: "ESP32 Internal Temp."
    id: internal_temp

