#I2C bus define
i2c:
  sda: GPIO41
  scl: GPIO42
  scan: True
  id: bus_a
  frequency: 50kHz

sensor:
  - platform: rotary_encoder
    id: my_encoder
    pin_a: GPIO19
    pin_b: GPIO20
    min_value: 0
    max_value: 3
    resolution: 1

    on_value:
      then:
        - lambda: |-
              if (!id(is_locked)) 
              {
                id(selected_square) = (int)x;
                // if (id(selected_square) < 0) id(selected_square) += 4;
                // WYMUŚ ODŚWIEŻENIE EKRANU NATYCHMIAST PO RUCHU:
                id(my_display).update(); 
              }

  # Wi-Fi Signal Strength (measured in dBm)
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: my_wifi_signal
    device_class: "signal_strength"
    unit_of_measurement: "dBm"    
    update_interval: 240s

# Uptime Sensor (How long the ESP has been running)
  - platform: uptime
    name: "Uptime"
    id: my_uptime
    update_interval: 60s
    
# Internal Chip Temperature (Optional but useful for S3)
  - platform: internal_temperature
    name: "ESP32 Internal Temp."
    id: internal_temp

