    inverted: false
    restore_mode: ALWAYS_OFF


# 2. Define the Trigger Inputs (Binary Sensors)
# These will trigger the relays when they receive a HIGH signal.
binary_sensor:

  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    name: "Encoder Button"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - lambda: |- 
               id(is_locked) = !id(is_locked);
               ESP_LOGD("custom", "Stan blokady: %s", id(is_locked) ? "ZABLOKOWANO" : "WOLNY");        
               id(my_display).update(); // Dodaj to tutaj!

  - platform: gpio
    pin: 
      number: GPIO10
      mode: INPUT_PULLDOWN # Keeps pin at 0V until a 5V/3.3V signal arrives
    name: "Trigger 1"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - switch.turn_on: relay_1
    on_release:
      then:
        - switch.turn_off: relay_1

  - platform: gpio
    pin: 
      number: GPIO11 
      mode: INPUT_PULLDOWN
    name: "Trigger 2"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_2
    on_release:
      then:
        - switch.turn_off: relay_2    

  - platform: gpio
    pin: 
      number: GPIO12 
      mode: INPUT_PULLDOWN
    name: "Trigger 3"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_3
    on_release:
      then:
        - switch.turn_off: relay_3    

  - platform: gpio
    pin: 
      number: GPIO13 
      mode: INPUT_PULLDOWN
    name: "Trigger 4"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_4
    on_release:
      then:
        - switch.turn_off: relay_4    


  - platform: gpio
    pin: 
      number: GPIO14
