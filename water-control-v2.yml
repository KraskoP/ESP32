time:
  - platform: sntp
    id: my_time
    timezone: "Europe/Warsaw" # Ustawia polską strefę czasową
    servers:
      - 0.pool.ntp.org


# Podstawowa czcionka (wymagana do lambdy)
font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 20

# Magistrala SPI na bezpiecznych pinach
spi:
  clk_pin: GPIO 5
  mosi_pin: GPIO 6

image:
  - file: "backgroundsm.png"  # Nazwa Twojego pliku
    id: my_background
    resize: 480x320         # ESPHome sam dopasuje rozmiar, jeśli trzeba
    type: RGB               # Użyj COLOR dla kolorowych wyświetlaczy jak ST7796  

display:
  - platform: mipi_spi
    id: my_display
    model: ST7796
    dimensions:
      width: 480
      height: 320
    # Sugerowane bezpieczniejsze piny dla S3:
    cs_pin: GPIO 4
    dc_pin: GPIO 7
    reset_pin: GPIO 8
    rotation: 90
    data_rate: 40MHz
    auto_clear_enabled: false
    update_interval: 500ms

    lambda: |-

      struct Point { int x; int y; };
        
      // Sekcja 1 (np. Trawnik Front)
      Point s1[] = {{35,270}, {175,270}, {175,250}, {135,250}, {115, 230}, {115, 165}, {35, 165}, {35,220}, {70,220}, {70,250}, {35, 250}, {35, 270} };
      // Sekcja 2 (np. Trawnik Front z tyłu)
      Point s2[] = {{35,160}, {130,160}, {130,30}, {30,30}, {30,75}, {55,75}, {55,120}, {35,120}, {35,160}};

      auto draw_zone = [&](Point pts[], int count, bool is_active, bool is_selected, Color active_col) 
      {
        // Logika koloru:
        // 1. Jeśli wybrany enkoderem -> Jasnoniebieski
        // 2. Jeśli nie wybrany, ale podlewa -> Kolor aktywny (np. zielony)
        // 3. W innym przypadku -> Szary
        Color col = Color(60, 60, 60); // domyślny szary
        if (is_selected) 
        {
            col = Color(0, 150, 255); // jasnoniebieski "focus"
        } 
        else if (is_active) 
        {
            col = active_col;
        }

        for (int i = 0; i < count; i++) {
            int x1 = pts[i].x; int y1 = pts[i].y;
            int x2 = pts[(i + 1) % count].x; int y2 = pts[(i + 1) % count].y;
          
            it.line(x1, y1, x2, y2, col);
            // Pogrubienie jeśli wybrany LUB aktywny
            if (is_active || is_selected) {
                it.line(x1+1, y1, x2+1, y2, col);
                it.filled_circle(x1, y1, 1, col);
            }
        }
      };


      // 1. Tło i biała ramka
      ;//  it.fill(Color(80,80,80));
      //   it.rectangle(0, 0, 480, 320, Color(255, 255, 255)); 
        if (id(redraw_background)) 
        {
          it.image(0, 0, id(my_background));
          id(redraw_background) = false; // Po narysowaniu blokujemy, by nie spowalniać pętli
        }
 

      // 2. Rysujemy Sekcje (zmieniają kolor gdy przekaźnik jest ON)

       draw_zone(s1, 12, id(relay_1).state, (id(selected_square) == 0), Color(0, 255, 0));
       draw_zone(s2, 9, id(relay_2).state, (id(selected_square) == 1), Color(0, 255, 0));

      //auto time_now = id(my_time).now();
      //it.filled_rectangle(0, 270, 460, 49, Color(103, 103, 103));   // background color in this part 
      //it.strftime(10, 290, id(my_font), Color(255, 255, 255), "%d.%m.%Y", time_now);
      //it.strftime(280, 290, id(my_font), Color(0, 200, 0), "%H:%M:%S", time_now);
      

      //it.printf(10, 100, id(my_font), Color(255, 255, 255), "R1:%s R2:%s R3:%s", 
      //    id(relay_1).state ? "ON" : "OFF",
      //    id(relay_2).state ? "ON" : "OFF",
      //    id(relay_3).state ? "ON" : "OFF");


switch:
  - platform: gpio
    pin: GPIO 9
    id: backlight_switch
    name: "Podswietlenie"
    restore_mode: ALWAYS_ON

  - platform: gpio
    pin: GPIO15
    id: relay_1
    name: "Relay 1"
    inverted: false 
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO16
    id: relay_2
    name: "Relay 2"
    inverted: false
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO17
    id: relay_3
    name: "Relay 3"
    inverted: false
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO18
    id: relay_4
    name: "Relay 4"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO43 # Using higher pins for S3 safety
    id: relay_5
    name: "Relay 5"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO44
    id: relay_6
    name: "Relay 6"
    inverted: false
    restore_mode: ALWAYS_OFF


# 2. Define the Trigger Inputs (Binary Sensors)
# These will trigger the relays when they receive a HIGH signal.
binary_sensor:

  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    name: "Encoder Button"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - lambda: |- 
               id(is_locked) = !id(is_locked);
               ESP_LOGD("custom", "Stan blokady: %s", id(is_locked) ? "ZABLOKOWANO" : "WOLNY");        
               id(redraw_background) = true;
               id(my_display).update(); // Dodaj to tutaj!

  - platform: gpio
    pin: 
      number: GPIO10
      mode: INPUT_PULLDOWN # Keeps pin at 0V until a 5V/3.3V signal arrives
    name: "Trigger 1"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - switch.turn_on: relay_1
    on_release:
      then:
        - switch.turn_off: relay_1

  - platform: gpio
    pin: 
      number: GPIO11 
      mode: INPUT_PULLDOWN
    name: "Trigger 2"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_2
    on_release:
      then:
        - switch.turn_off: relay_2    

  - platform: gpio
    pin: 
      number: GPIO12 
      mode: INPUT_PULLDOWN
    name: "Trigger 3"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_3
    on_release:
      then:
        - switch.turn_off: relay_3    

  - platform: gpio
    pin: 
      number: GPIO13 
      mode: INPUT_PULLDOWN
    name: "Trigger 4"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_4
    on_release:
      then:
        - switch.turn_off: relay_4    


  - platform: gpio
    pin: 
      number: GPIO14
      mode: INPUT_PULLDOWN
    name: "Trigger 5"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_5
    on_release:
      then:
        - switch.turn_off: relay_5    


  - platform: gpio
    pin: 
      number: GPIO21
      mode: INPUT_PULLDOWN
    name: "Trigger 6"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_6
    on_release:
      then:
        - switch.turn_off: relay_6