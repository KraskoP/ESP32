    ssid: "Watering Fallback Hotspot"
    password: "ztKHYUuuA5iB"

captive_portal:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
      id: esp_ip
      icon: "mdi:information-box"
    ssid:
      name: WIFI SSID
      id: esp_ssid
      icon: "mdi:information-box"
    mac_address:
      name: MAC Address
      id: esp_mac
      icon: "mdi:information-box"
      
#I2C bus define
i2c:
  sda: GPIO41
  scl: GPIO42
  scan: True
  id: bus_a
  frequency: 50kHz

sensor:
  - platform: rotary_encoder
    id: my_encoder
    pin_a: GPIO19
    pin_b: GPIO20
    on_value:
      then:
        - lambda: |-
              if (!id(is_locked)) {
              id(selected_square) = (int)x % 4;
              if (id(selected_square) < 0) id(selected_square) += 4;
              // WYMUŚ ODŚWIEŻENIE EKRANU NATYCHMIAST PO RUCHU:
              id(my_display).update(); 
              }

  # Wi-Fi Signal Strength (measured in dBm)
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: my_wifi_signal
    device_class: "signal_strength"
    unit_of_measurement: "dBm"    
    update_interval: 240s

# Uptime Sensor (How long the ESP has been running)
  - platform: uptime
    name: "Uptime"
    id: my_uptime
    update_interval: 60s
    
# Internal Chip Temperature (Optional but useful for S3)
  - platform: internal_temperature
    name: "ESP32 Internal Temp."
    id: internal_temp

