    servers:
      - 0.pool.ntp.org


# Podstawowa czcionka (wymagana do lambdy)
font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 30

# Magistrala SPI na bezpiecznych pinach
spi:
  clk_pin: GPIO 5
  mosi_pin: GPIO 6

image:
  - file: "background.png"  # Nazwa Twojego pliku
    id: my_background
    resize: 480x320         # ESPHome sam dopasuje rozmiar, jeśli trzeba
    type: RGB               # Użyj COLOR dla kolorowych wyświetlaczy jak ST7796  

display:
  - platform: mipi_spi
    id: my_display
    model: ST7796
    dimensions:
      width: 480
      height: 320
    # Sugerowane bezpieczniejsze piny dla S3:
    cs_pin: GPIO 4
    dc_pin: GPIO 7
    reset_pin: GPIO 8
    rotation: 90
    data_rate: 40MHz
    update_interval: 100ms

    lambda: |-
      // 1. Tło i biała ramka
      // it.fill(Color::BLACK);
      // it.rectangle(0, 0, 480, 320, Color(255, 255, 255)); 
      // it.image(0, 0, id(my_background));
 
      // Tablica kolorów bazowych
        Color colors[] = {
          Color(255, 0, 0),   // 0: Czerwony
          Color(0, 255, 0),   // 1: Zielony
          Color(0, 0, 255),   // 2: Niebieski
          Color(255, 255, 0)  // 3: Żółty
      };

        for (int i = 0; i < 4; i++) {
          int x_offset = 10 + (i * 60);
          Color draw_color = colors[i];

        // Jeśli kwadrat jest wybrany (selected_square == i)
          if (id(selected_square) == i) {
            draw_color = Color(255, 255, 255); // Zmień na biały
         }

        it.filled_rectangle(x_offset, 40, 50, 50, draw_color);
        
        // Opcjonalna ramka dla zatwierdzonego (locked) wyboru
        if (id(selected_square) == i && id(is_locked)) {
          it.rectangle(x_offset-2, 38, 54, 54, Color(255, 255, 255)); 
        }
      }

      // 2. Czas od uruchomienia
      //float t = millis() / 1000.0;
      //it.printf(10, 10, id(my_font), Color(255, 255, 255), "Czas: %.1fs", t);

      auto time_now = id(my_time).now();
      it.strftime(10, 240, id(my_font), Color(255, 255, 255), "%d.%m.%Y", time_now);
      it.strftime(280, 240, id(my_font), Color(0, 200, 0), "%H:%M:%S", time_now);

      // 3. Test kolorów (R, G, B, Y) - definiujemy przez Color(R, G, B)
      it.filled_rectangle(10, 40, 50, 50, Color(255, 0, 0));   // Czerwony
      it.filled_rectangle(70, 40, 50, 50, Color(0, 255, 0));   // Zielony
      it.filled_rectangle(130, 40, 50, 50, Color(0, 0, 255));  // Niebieski
      it.filled_rectangle(190, 40, 50, 50, Color(255, 255, 0));// Żółty
     
      // 5. Linia i tekst
      // it.line(10, 310, x_pos, y_pos, Color(255, 0, 255));     // Magenta
      it.print(280, 10, id(my_font), Color(255, 255, 0), "ST7796 TEST OK");

      it.printf(10, 100, id(my_font), Color(255, 255, 255), "R1:%s R2:%s R3:%s", 
          id(relay_1).state ? "ON" : "OFF",
          id(relay_2).state ? "ON" : "OFF",
          id(relay_3).state ? "ON" : "OFF");



#    lambda: |-
#      it.fill(Color::BLACK);
#      it.print(20, 20, id(my_font), Color::WHITE, "EKRAN DZIALA!");

# Uproszczone podświetlenie jako zwykły PIN

switch:
  - platform: gpio
    pin: GPIO 9
    id: backlight_switch
    name: "Podswietlenie"
    restore_mode: ALWAYS_ON

  - platform: gpio
    pin: GPIO15
    id: relay_1
    name: "Relay 1"
    inverted: false 
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO16
    id: relay_2
    name: "Relay 2"
    inverted: false
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO17
    id: relay_3
    name: "Relay 3"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO18
    id: relay_4
    name: "Relay 4"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO43 # Using higher pins for S3 safety
    id: relay_5
    name: "Relay 5"
    inverted: false
    restore_mode: ALWAYS_OFF


  - platform: gpio
    pin: GPIO44
    id: relay_6
    name: "Relay 6"
    inverted: false
    restore_mode: ALWAYS_OFF


# 2. Define the Trigger Inputs (Binary Sensors)
# These will trigger the relays when they receive a HIGH signal.
binary_sensor:

  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT_PULLUP
      inverted: true
    name: "Encoder Button"
    on_press:
      then:
        - lambda: "id(is_locked) = !id(is_locked);"

  - platform: gpio
    pin: 
      number: GPIO10
      mode: INPUT_PULLDOWN # Keeps pin at 0V until a 5V/3.3V signal arrives
    name: "Trigger 1"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - switch.turn_on: relay_1
    on_release:
      then:
        - switch.turn_off: relay_1

  - platform: gpio
    pin: 
      number: GPIO11 
      mode: INPUT_PULLDOWN
    name: "Trigger 2"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_2
    on_release:
      then:
        - switch.turn_off: relay_2    

  - platform: gpio
    pin: 
      number: GPIO12 
      mode: INPUT_PULLDOWN
    name: "Trigger 3"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_3
    on_release:
      then:
        - switch.turn_off: relay_3    

  - platform: gpio
    pin: 
      number: GPIO13 
      mode: INPUT_PULLDOWN
    name: "Trigger 4"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_4
    on_release:
      then:
        - switch.turn_off: relay_4    


  - platform: gpio
    pin: 
      number: GPIO14
      mode: INPUT_PULLDOWN
    name: "Trigger 5"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_5
    on_release:
      then:
        - switch.turn_off: relay_5    


  - platform: gpio
    pin: 
      number: GPIO21
      mode: INPUT_PULLDOWN
    name: "Trigger 6"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press: 
     then:
        - switch.turn_on: relay_6
    on_release:
      then:
        - switch.turn_off: relay_6