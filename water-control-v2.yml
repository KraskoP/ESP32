substitutions:
  devicename: "watering-controler"

globals:
  - id: selected_square
    type: int
    restore_value: no
    initial_value: "0" # 0=Czerwony, 1=Zielony, 2=Niebieski, 3=Żółty
  - id: is_locked
    type: bool
    restore_value: no
    initial_value: "false"

esphome:
  name: ${devicename}
  on_boot:
    priority: -10
    then:
      - switch.turn_on: backlight_switch



esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "jRk+WH7ka6UoenNffrOExh0USPW5De1pP9OPOPD1K4I="

ota:
  - platform: esphome
    password: "c6c2114b18b59dd26417358b1a8c51ab"

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
